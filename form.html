<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单页</title>
    <style>
        a{
            text-decoration: none;
        }
        .navigation{
            width: 100%;
            height: 100%;
            border-bottom: 1px solid #ddd;
            padding-bottom: 12px;
        }
        .title{
            font-size: 55px;
            font-weight: 500;
            margin: 5px 0px 5px 20px;
        }
        .nav-box{
            float: right;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 5px;
            padding-right: 5px;
            margin-left: 6vh;
            margin-right: 6vh;
            margin-top: 12px;
        }
        .navtxt{
            color: black;
            font-size: 20px;
            font-weight: 600;
        }
        .nav-title:hover .navtxt{
            color: rgb(144, 144, 144);
        }
        .formlist{
            width: 40%;
            margin-top: 5vh;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 5vh;
        }
    </style>
    <script>
        function changetxt(){
            var boxtxt = document.getElementById("ipt").value;
            console.log(boxtxt);
            var txtp = document.getElementById("fp");
            console.log(txtp);
            txtp.innerHTML = boxtxt;
        }
    </script>
</head>
<body>
    <div class="navigation">
        <span class="title">表单页</span> 
        <div class="nav-box" style="border-bottom: 1.5px solid #6b6b6b;">
            <a class="nav-title"><span class="navtxt">·表单页·</span></a>
        </div>
        <div class="nav-box">
            <a class="nav-title" href="./specific.html"><span class="navtxt">·详情页·</span></a>
        </div>
        <div class="nav-box">
            <a class="nav-title" href="./list.html"><span class="navtxt">·列表页·</span></a>
        </div>
        <div class="nav-box">
            <a class="nav-title" href="./index.html"><span class="navtxt">·首页·</span></a>
        </div>
    </div>
    <div class="spec">
        <div class="formlist">
            <form name="formTest" action="" method="get" enctype="application/x-www-form-urlencoded" >
                <span>修改：</span><p id="fp">测试输入</p>
                <input id="ipt" type="text" name="textTest" value="测试输入"/><br>
                <input type="password" name="pwd" value="code"><br>
                <input type="radio" name="sex" value="male" checked>男<br>
                <input type="radio" name="sex" value="female">女<br>
                <input type="checkbox" name="vehicle" value="Bike" checked>自行车<br>
                <input type="checkbox" name="vehicle" value="Car">汽车<br>
                生日：<select name="birth">
                    <option value="1996">1996</option>
                    <option value="1997">1997</option>
                    <option value="1998">1998</option>
                    <option value="1999">1999</option>
                    <option value="2000">2000</option>              
                </select>年<br>
                <textarea name="txt" cols="19" rows="8">介绍一下自己</textarea><br>
                <input type="submit" value="提交表单"/>   
            </form>
            <button onclick="changetxt()">测试修改</button>
        </div>
    </div>
</body>
</html>
